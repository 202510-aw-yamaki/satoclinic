<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hero Layout</title>
  <style>
    :root {
      --gray-bg: #fafafa;
      --header-gray: #e0e0e0;
      --panel-green: #19c677;
      --panel-border: #d6d6d6;
      --text-gray: #d9d9d9;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      display: flex;
      justify-content: center;
      background: var(--gray-bg);
      font-family: sans-serif;
    }

    .page {
      width: 1440px;
      min-height: 620px;
      position: relative;
      background: var(--gray-bg);
      padding-top: 60px;
    }

    header {
      height: 60px;
      width: 100%;
      background: var(--header-gray);
      position: absolute;
      top: 0;
      left: 0;
      display: flex;
      align-items: center;
      padding: 0 16px;
      border: 1px solid #000;
      box-sizing: border-box;
    }

    .logo {
      width: 120px;
      height: 80px;
      background: #fff;
      border-radius: 30px;
      border: 1px solid transparent;
      margin-top: -10px;
    }

    nav {
      display: flex;
      gap: 10px;
      margin-left: 20px;
      flex: 1;
      justify-content: center;
    }

    nav .item {
      height: 42px;
      border: 1px solid #000;
      padding: 8px 16px;
      min-width: 64px;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-left: 20px;
    }

    .search-box {
      width: 120px;
      height: 28px;
      border: 1px solid #000;
    }

    .cta {
      width: 180px;
      height: 40px;
      background: #3ba7c9;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px 24px;
      gap: 10px;
      border: 1px solid transparent;
    }

    .cta .label {
      width: 100px;
      height: 34px;
      border: 1px solid #000;
    }

    .hero {
      width: 1200px;
      height: 575px;
      background: #fff;
      border-radius: 30px;
      border: 1px solid #000;
      margin: 30px auto 0;
      padding: 20px;
      position: relative;
      display: flex;
      gap: 30px;
    }

    .hero-image {
      width: 624px;
      height: 475px;
      background: #e0e0e0;
      border: 1px solid #000;
      border-radius: 30px;
      flex-shrink: 0;
    }

    .hero-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 30px;
      border-radius: 30px;
      overflow: hidden;
      box-shadow: 0 4px 4px rgba(0, 0, 0, 0.25);
      outline: 1px solid #000;
      outline-offset: -1px;
    }

    .hero-panel .catch-area {
      background: var(--panel-green);
      padding: 35px 30px 35px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 35px;
      position: relative;
    }

    .hero-panel .catch-area::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 24px;
      border-bottom: 1px solid rgba(0, 0, 0, 0.3);
    }

    .catch-copy {
      width: 226px;
      height: 74px;
      background: var(--panel-green);
      border: 1px solid #000;
      padding: 10px;
    }

    .button-group {
      display: flex;
      flex-direction: column;
      gap: 35px;
      width: 200px;
    }

    .pill-button {
      height: 40px;
      border-radius: 999px;
      background: var(--panel-green);
      border: 1px solid #000;
      outline: 4px #eee solid;
      outline-offset: -4px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .pill-button span {
      width: 67px;
      height: 22px;
      border: 1px solid #000;
      display: block;
    }

    .schedule {
      background: #fff;
      border: 1px solid #000;
      border-radius: 30px;
      height: 135px;
      margin: 0 20px 20px;
    }

    .hero-description {
      position: absolute;
      bottom: -52px;
      left: -10px;
      width: calc(100% + 20px);
      display: flex;
      flex-direction: column;
      gap: 0;
      border: 1px solid #000;
      border-bottom: none;
      background: transparent;
      padding: 0;
    }

    .hero-description .line {
      height: 26px;
      background: #fff;
      border-top: 1px solid #000;
      border-left: 1px solid #000;
      border-right: 1px solid #000;
    }

    .description-blocks {
      width: 1200px;
      margin: 90px auto 0;
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <div class="logo"></div>
      <nav>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item" style="width:96px;"></div>
        <div class="item" style="width:96px;"></div>
        <div class="item"></div>
        <div class="item" style="width:160px;"></div>
        <div class="item" style="width:112px;"></div>
      </nav>
      <div class="header-actions">
        <div class="search-box"></div>
        <div class="cta"><div class="label"></div></div>
      </div>
    </header>

    <section class="hero">
      <div class="hero-image"></div>
      <div class="hero-panel">
        <div class="catch-area">
          <div class="catch-copy"></div>
          <div class="button-group">
            <div class="pill-button"><span></span></div>
            <div class="pill-button"><span></span></div>
            <div class="pill-button"><span></span></div>
          </div>
        </div>
        <div class="schedule"></div>
      </div>
      <div class="hero-description">
        <div class="line"></div>
        <div class="line"></div>
      </div>
    </section>
  </div>
</body>
</html>
