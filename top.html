<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TOP | ワイヤーフレーム</title>
  <style>
    :root {
      --surface: #f7f9f8;
      --line: #d7e6dd;
      --accent: #1eb89f;
      --accent-2: #88d8c6;
      --accent-3: #f0cde4;
      --accent-4: #cfe8e0;
      --accent-5: #f6efe4;
      --text: #2b3a33;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      width: 100%;
      font-family: "Noto Sans JP", system-ui, -apple-system, sans-serif;
      background: var(--surface);
      color: var(--text);
    }

    a { color: inherit; text-decoration: none; }

    header {
      width: 100%;
      background: #ffffff;
      border-bottom: 1px solid var(--line);
    }

    .main-container {
      width: 100%;
      margin: 0 auto;
      padding-inline: 11.11vw;
    }

    @media (min-width: 1080px) {
      .main-container {
        padding-inline: 120px;
      }
    }

    .header-inner {
      display: grid;
      grid-template-columns: 180px 1fr 200px;
      align-items: center;
      gap: 16px;
      min-height: 80px;
    }

    .logo-area, .nav-area, .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-placeholder {
      width: 160px;
      height: 48px;
      border: 2px solid var(--accent);
      border-radius: 8px;
      display: grid;
      place-items: center;
      font-weight: 700;
      background: #fff;
    }

    .nav-area {
      justify-content: center;
      flex-wrap: wrap;
    }

    .nav-chip {
      min-width: 120px;
      padding: 12px 14px;
      border: 1px dashed var(--line);
      border-radius: 12px;
      background: #fff;
      text-align: center;
      font-weight: 700;
    }

    .header-actions { justify-content: flex-end; }

    .btn-ghost {
      padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid var(--accent);
      background: #fff;
      font-weight: 700;
      min-width: 120px;
      text-align: center;
    }

    .btn-solid {
      padding: 12px 16px;
      border-radius: 10px;
      background: var(--accent);
      color: #fff;
      font-weight: 800;
      min-width: 140px;
      text-align: center;
    }

    main { width: 100%; }

    section { padding: 40px 0; }

    .hero-block {
      display: grid;
      gap: 14px;
      grid-template-columns: 2fr 1fr;
      align-items: stretch;
    }

    .hero-left {
      background: #c9e6e0;
      border-radius: 12px;
      min-height: 260px;
      display: grid;
      grid-template-rows: 1fr 100px;
      gap: 12px;
      padding: 16px;
    }

    .hero-banner {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #ffffff;
      display: grid;
      place-items: center;
      min-height: 200px;
    }

    .hero-buttons {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px;
    }

    .hero-right {
      background: #e5f6f1;
      border-radius: 12px;
      padding: 16px;
      display: grid;
      gap: 12px;
    }

    .info-panel {
      background: #d7efe8;
      border-radius: 10px;
      padding: 12px;
      min-height: 120px;
      border: 1px dashed var(--accent);
      display: grid;
      place-items: center;
    }

    .pill-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .pill { background: #fff; border: 1px dashed var(--line); border-radius: 12px; height: 40px; }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
    }

    .section-title {
      min-width: 160px;
      padding: 10px 16px;
      border-left: 6px solid var(--accent);
      background: #fff;
      border-radius: 8px;
      font-weight: 800;
    }

    .cards { display: flex; flex-wrap: wrap; gap: 12px; }
    .card {
      flex: 1 1 260px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      min-height: 120px;
      padding: 12px;
      display: grid;
      gap: 10px;
    }

    .card-image { background: #dcefe8; border-radius: 8px; height: 120px; border: 1px dashed var(--accent-2); }
    .card-body { background: #f2f6f4; border-radius: 8px; height: 60px; border: 1px dashed var(--line); }

    .banner-wide {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #ffffff;
      min-height: 160px;
      padding: 12px;
      display: grid;
      place-items: center;
    }

    .feature-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 12px;
    }

    .feature-panel { border: 1px solid var(--line); border-radius: 10px; background: #f8fffc; min-height: 180px; padding: 12px; }
    .feature-card { background: #fff; border: 1px solid var(--line); border-radius: 10px; min-height: 140px; padding: 12px; }

    .column-grid { display: grid; grid-template-columns: 1.4fr 1fr; gap: 12px; }
    .column { border: 1px solid var(--line); border-radius: 10px; padding: 12px; background: #fff; min-height: 160px; }

    .pale-block { background: #dff5ed; border: 1px solid var(--line); border-radius: 10px; min-height: 120px; padding: 10px; }
    .pale-block.pink { background: #f4dde9; }
    .pale-block.yellow { background: #f8f0df; }

    .map-area { border: 1px solid var(--line); border-radius: 10px; background: #fff; min-height: 280px; padding: 10px; }

    .footer { background: #0e9c82; color: #fff; padding: 30px 0; width: 100%; }
    .footer-inner { display: grid; gap: 14px; }
    .footer-line { height: 28px; border: 1px dashed rgba(255,255,255,0.4); border-radius: 8px; }

    @media (max-width: 960px) {
      .header-inner { grid-template-columns: 1fr; justify-items: center; }
      .hero-block { grid-template-columns: 1fr; }
      .feature-grid, .column-grid { grid-template-columns: 1fr; }
      .pill-row { grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); }
    }
  </style>
</head>
